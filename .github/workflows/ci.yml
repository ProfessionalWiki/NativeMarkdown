name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: "PHPUnit: MW ${{ matrix.mw }}, PHP ${{ matrix.php }}"

    strategy:
      fail-fast: false
      matrix:
        include:
          - mw: 'REL1_43'
            php: '8.1'
          - mw: 'REL1_43'
            php: '8.3'
            coverage: true

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mediawiki

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          tools: composer

      - name: Cache MediaWiki
        id: cache-mediawiki
        uses: actions/cache@v4
        with:
          path: |
            mediawiki
            !mediawiki/extensions/
            !mediawiki/vendor/
          key: mw_${{ matrix.mw }}-php${{ matrix.php }}-v2

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-php${{ matrix.php }}

      - uses: actions/checkout@v4
        with:
          path: EarlyCopy

      - name: Install MediaWiki
        if: steps.cache-mediawiki.outputs.cache-hit != 'true'
        working-directory: ~
        run: bash EarlyCopy/.github/workflows/installMediaWiki.sh ${{ matrix.mw }} NativeMarkdown

      - uses: actions/checkout@v4
        with:
          path: mediawiki/extensions/NativeMarkdown

      - name: Composer allow-plugins
        run: composer config --no-plugins allow-plugins.composer/installers true

      - run: composer update

      # Optional soft dependency, not part of the checkout, so clone it on every
      # job. Removed first: a restored MediaWiki cache can already hold a copy,
      # which would make the clone fail on a non-empty directory.
      - name: Clone SyntaxHighlight
        run: |
          rm -rf extensions/SyntaxHighlight_GeSHi
          git clone --depth 1 -b ${{ matrix.mw }} https://github.com/wikimedia/mediawiki-extensions-SyntaxHighlight_GeSHi extensions/SyntaxHighlight_GeSHi

      - name: Run update.php
        run: php maintenance/update.php --quick

      - name: Run PHPUnit
        if: ${{ !matrix.coverage }}
        run: php tests/phpunit/phpunit.php extensions/NativeMarkdown/tests/phpunit/

      - name: Run PHPUnit with code coverage
        if: ${{ matrix.coverage }}
        run: php tests/phpunit/phpunit.php -c extensions/NativeMarkdown --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.coverage }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_GLOBAL_TOKEN }}
          slug: ProfessionalWiki/NativeMarkdown

  unit:
    name: "Standalone unit tests (no MediaWiki), PHP ${{ matrix.php }}"

    strategy:
      matrix:
        php: [ '8.1', '8.3' ]

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extension

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          tools: composer

      - uses: actions/checkout@v4
        with:
          path: extension

      - name: Composer update
        run: composer update --no-progress --no-interaction --prefer-dist

      - name: Run pure pipeline tests
        run: vendor/bin/phpunit --testsuite Unit

  static-analysis:
    name: "Static analysis: MW ${{ matrix.mw }}, PHP ${{ matrix.php }}"

    strategy:
      matrix:
        include:
          - mw: 'REL1_43'
            php: '8.3'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mediawiki/extensions/NativeMarkdown

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          tools: composer, cs2pr

      - name: Cache MediaWiki
        id: cache-mediawiki
        uses: actions/cache@v4
        with:
          path: |
            mediawiki
            !mediawiki/extensions/
            !mediawiki/vendor/
          key: mw_static_analysis-v2

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer_static_analysis

      - uses: actions/checkout@v4
        with:
          path: EarlyCopy

      - name: Install MediaWiki
        if: steps.cache-mediawiki.outputs.cache-hit != 'true'
        working-directory: ~
        run: bash EarlyCopy/.github/workflows/installMediaWiki.sh ${{ matrix.mw }} NativeMarkdown

      - uses: actions/checkout@v4
        with:
          path: mediawiki/extensions/NativeMarkdown

      - name: Composer allow-plugins
        run: composer config --no-plugins allow-plugins.composer/installers true

      - name: Composer update
        run: composer update --no-progress --no-interaction --prefer-dist --optimize-autoloader

      # SyntaxHighlight is only a soft dependency, but the Persistence adapter
      # references its class, so phpstan and psalm need its source to resolve it.
      # Removed first: a restored MediaWiki cache can already hold a copy.
      - name: Clone SyntaxHighlight
        working-directory: mediawiki
        run: |
          rm -rf extensions/SyntaxHighlight_GeSHi
          git clone --depth 1 -b ${{ matrix.mw }} https://github.com/wikimedia/mediawiki-extensions-SyntaxHighlight_GeSHi extensions/SyntaxHighlight_GeSHi

      - name: PHPStan
        run: php vendor/bin/phpstan analyse --error-format=checkstyle --no-progress | cs2pr

      - name: Psalm
        run: php vendor/bin/psalm --no-progress --shepherd

  code-style:
    name: "Code style: MW ${{ matrix.mw }}, PHP ${{ matrix.php }}"

    strategy:
      matrix:
        include:
          - mw: 'REL1_43'
            php: '8.3'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mediawiki/extensions/NativeMarkdown

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, php-ast
          tools: composer

      - name: Cache MediaWiki
        id: cache-mediawiki
        uses: actions/cache@v4
        with:
          path: |
            mediawiki
            !mediawiki/extensions/
            !mediawiki/vendor/
          key: mw_static_analysis-v2

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer_static_analysis

      - uses: actions/checkout@v4
        with:
          path: EarlyCopy

      - name: Install MediaWiki
        if: steps.cache-mediawiki.outputs.cache-hit != 'true'
        working-directory: ~
        run: bash EarlyCopy/.github/workflows/installMediaWiki.sh ${{ matrix.mw }} NativeMarkdown

      - uses: actions/checkout@v4
        with:
          path: mediawiki/extensions/NativeMarkdown

      - name: Composer allow-plugins
        run: composer config --no-plugins allow-plugins.composer/installers true

      - name: Composer update
        run: composer update --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - run: vendor/bin/phpcs -p -s
